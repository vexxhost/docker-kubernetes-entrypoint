name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write
  security-events: write

jobs:
  image:
    uses: vexxhost/github-actions/.github/workflows/image.yml@ee90fdf77bca9a1426af5073b44cae27dc0bdaca # main
    with:
      image-ref: ghcr.io/${{ github.repository_owner }}/kubernetes-entrypoint
      push: ${{ github.event_name == 'push' }}
