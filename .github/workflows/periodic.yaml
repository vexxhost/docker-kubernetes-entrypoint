name: periodic

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: vexxhost/github-actions/scan-image@ee90fdf77bca9a1426af5073b44cae27dc0bdaca # main
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/kubernetes-entrypoint:edge
